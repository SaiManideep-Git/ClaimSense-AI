name: ClaimSense AI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Test & Adjudicate Rules on Backend
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package.json

      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      - name: Run Rules Adjudication Test Case Verifier
        # Executes the rules engine test suite via the npm test script
        run: |
          cd server
          npm test

  # Job 2: Typecheck & Build Frontend
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package.json

      - name: Install Client Dependencies
        run: |
          cd client
          npm install

      - name: Compile & Build Frontend
        run: |
          cd client
          npm run build

  # Job 3: Deployment Status Log
  deploy-log:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Log Deploy Verification Status
        run: |
          echo "All builds and rules assertions passed. Auto-deployment is triggered successfully!"
